<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrieve a Document - DDRS</title>
    <link rel="shortcut icon" href="logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f4f7f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            color: #333;
        }

        .navbar-retrieval {
            background-color: #114d24;
            padding: 0.7rem 1.4rem;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header-logo-circle {
            width: 44px;
            height: 44px;
            background-color: #b8d0c3;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .header-logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            margin: 0;
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .brand-subtitle {
            margin: 0;
            font-size: 0.74rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.2;
        }

        .btn-exit {
            background-color: #ffffff;
            color: #114d24;
            font-weight: 700;
            border-radius: 10px;
            padding: 7px 16px;
            border: none;
            font-size: 0.84rem;
            min-width: 90px;
            text-decoration: none;
        }

        .btn-exit:hover {
            background-color: #eef3ef;
            color: #114d24;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem 0.8rem 0.7rem;
        }

        .content-wrapper {
            width: 100%;
            max-width: 980px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 0.45rem;
        }

        .page-title {
            font-weight: 800;
            font-size: 1.55rem;
            color: #114d24;
            margin-bottom: 0.1rem;
            line-height: 1.15;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: #5f6b63;
            margin: 0;
            font-weight: 500;
            line-height: 1.25;
        }

        .retrieval-card {
            border: 1px solid #d9e2dc;
            border-radius: 18px;
            padding: 1.15rem 1rem 1rem;
            position: relative;
            background-color: #ffffff;
            max-width: 460px;
            margin: 0 auto;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.05);
        }

        .icon-floating-download {
            width: 50px;
            height: 50px;
            background: linear-gradient(180deg, #3d8c4d 0%, #2e6b3e 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid #f4f7f4;
            box-shadow: 0 7px 18px rgba(46, 107, 62, 0.16);
        }

        .card-title {
            font-weight: 700;
            margin-top: 0.4rem;
            margin-bottom: 0.85rem;
            color: #114d24;
            font-size: 1rem;
            text-align: center;
        }

        .form-label-custom {
            font-weight: 600;
            font-size: 0.84rem;
            margin-bottom: 0.2rem;
            display: block;
            text-align: left;
            color: #233328;
        }

        .input-pill-static {
            border-radius: 10px;
            border: 1px solid #cfd8d2;
            padding: 0.55rem 0.75rem;
            color: #333;
            font-weight: 500;
            background-color: #fff;
            width: 100%;
            margin-bottom: 0.65rem;
            font-size: 0.84rem;
            min-height: 40px;
            box-shadow: none;
        }

        .input-pill-static:focus {
            outline: none;
            border-color: #2e6b3e;
            box-shadow: 0 0 0 0.12rem rgba(46, 107, 62, 0.12);
        }

        .input-pill-static::placeholder {
            color: #8a948e;
            font-weight: 500;
        }

        .btn-retrieve {
            background: linear-gradient(180deg, #3d8c4d 0%, #2e6b3e 100%);
            color: white;
            border-radius: 10px;
            padding: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            width: 100%;
            margin-top: 0.2rem;
        }

        .btn-retrieve:hover {
            background: linear-gradient(180deg, #357944 0%, #255733 100%);
            color: white;
        }

        footer {
            margin-top: auto;
            padding: 0.45rem 0.8rem 0.6rem;
            text-align: center;
            font-size: 0.74rem;
            color: #7b7b7b;
            line-height: 1.2;
        }

        @media (max-width: 767px) {
            .navbar-retrieval {
                padding: 0.7rem 0.9rem;
            }

            .brand-subtitle {
                display: none;
            }

            .page-title {
                font-size: 1.3rem;
            }

            .page-subtitle {
                font-size: 0.78rem;
            }

            .main-content {
                padding: 0.9rem 0.7rem;
                align-items: flex-start;
            }

            .retrieval-card {
                max-width: 100%;
                padding: 1rem 0.9rem 0.9rem;
            }

            .icon-floating-download {
                width: 46px;
                height: 46px;
                font-size: 1.2rem;
                top: -23px;
            }

            .btn-exit {
                min-width: unset;
                padding: 7px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar-retrieval d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <div class="header-logo-circle me-2">
                <img src="logo.png" alt="Logo">
            </div>
            <div>
                <h5 class="brand-title">Document Retrieval Dashboard</h5>
                <p class="brand-subtitle">Document Retrieval</p>
            </div>
        </div>
        <a href="faculty_deposit.html" class="btn btn-exit">Exit</a>
    </nav>

    <section class="main-content">
        <div class="content-wrapper">
            <div class="page-header">
                <h1 class="page-title">Retrieve a Document</h1>
                <p class="page-subtitle">Enter the transaction code to proceed with retrieval</p>
            </div>

            <div class="retrieval-card">
                <div class="icon-floating-download">
                    <i class="bi bi-download"></i>
                </div>
                
                <h5 class="card-title">Enter Your Retrieval Code</h5>

                <form method="GET" action="unlock.html">
                    <div class="text-start">
                        <label class="form-label-custom">Transaction Code</label>
                        <input 
                            class="input-pill-static" 
                            name="locker" 
                            type="text" 
                            required 
                            placeholder="Enter transaction code"
                        >
                    </div>

                    <button type="submit" class="btn btn-retrieve">Retrieve Now</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 College of Engineering, Pamantasan ng Cabuyao
    </footer>

</body>
</html>
