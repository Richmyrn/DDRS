<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document System Landing Page</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Manrope:wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root{
          --brand:#0B5D1E;
          --brand2:#2E7D32;
          --glow:#FFC107;

          --font-ui: Manrope, Inter, system-ui, sans-serif;
          --font-display: Outfit, Manrope, sans-serif;
        }

        *{ box-sizing:border-box; margin:0; }

        body.welcome-body{
          min-height:100vh;
          color:#fff;
          background: radial-gradient(120% 90% at 20% 0%, #2E7D32 0%, #0B5D1E 45%, #0A5e34 70%);
          font-family: var(--font-ui);
          overflow:hidden;
          position:relative;
        }

        /* Glow background */
        body::before, body::after{
          content:"";
          position:absolute;
          width:100%;
          height:50vh;
          background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
          filter: blur(8px);
          animation: floatGlow 14s linear infinite alternate;
        }

        body::after{
          top:-10%;
          animation-duration:18s;
        }

        @keyframes floatGlow{
          from{transform:translateY(0)}
          to{transform:translateY(-20px)}
        }

        .welcome-cover{
          display:grid;
          place-items:center;
          min-height:100vh;
          text-decoration:none;
          color:inherit;
        }

        .welcome-layer{
          text-align:center;
          padding:40px;
        }

        .welcome-topline{
          display:inline-flex;
          align-items:center;
          gap:10px;
          background:rgba(255,255,255,0.15);
          padding:8px 18px;
          border-radius:50px;
          font-weight:700;
          margin-bottom:20px;
        }

        .dot{
          width:8px;
          height:8px;
          background:var(--glow);
          border-radius:50%;
          box-shadow:0 0 10px var(--glow);
        }

        .welcome-title{
          font-family:var(--font-display);
          font-size:clamp(3rem, 10vw, 6rem);
          font-weight:800;
          line-height:1.05;
          text-shadow:0 10px 25px rgba(0,0,0,0.3);
          margin-bottom:20px;
          animation: scanShimmer 2s ease-in-out infinite;
        }

        .accent{
          background:linear-gradient(135deg,#fff,#C8FFD0);
          -webkit-background-clip:text;
          color:transparent;
        }

        @keyframes scanShimmer{
          0%,100%{transform:translateY(0)}
          50%{transform:translateY(-3px)}
        }

        .welcome-cta{
          display:inline-flex;
          align-items:center;
          gap:10px;
          animation:pulse 1.8s infinite;
        }

        .cta-pill{
          background:#fff;
          color:#0B5D1E;
          padding:10px 20px;
          border-radius:50px;
          font-weight:800;
        }

        .cta-arrow{
          color:#fff;
        }

        @keyframes pulse{
          0%,100%{transform:translateY(0)}
          50%{transform:translateY(-4px)}
        }

        /* moving bars */
        .welcome-bars{
          position:absolute;
          inset:0;
          pointer-events:none;
        }

        .bar{
          position:absolute;
          width:40vw;
          height:10px;
          background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
          transform:rotate(-8deg);
          animation:sweep 8s linear infinite;
        }

        .b1{ top:20%; left:-10%; }
        .b2{ top:50%; left:-12%; animation-delay:1s; }
        .b3{ top:80%; left:-8%; animation-delay:2s; }

        @keyframes sweep{
          from{transform:translateX(-20vw) rotate(-8deg); opacity:0}
          20%{opacity:1}
          80%{opacity:1}
          to{transform:translateX(120vw) rotate(-8deg); opacity:0}
        }

        .page-wipe{
          position:fixed;
          inset:0;
          background:linear-gradient(135deg,var(--brand),var(--brand2));
          transform:translateY(100%);
          transition:0.4s;
        }
    </style>
</head>

<body class="welcome-body">

    <a href="user_type.php" class="welcome-cover">
        <div class="welcome-layer">

            <div class="welcome-topline">
                <span class="dot"></span>
                College of Engineering • PNC
            </div>

            <h1 class="welcome-title">
                Document <span class="accent">Deposit</span> &amp; 
                <span class="accent">Retrieval</span> System
            </h1>

            <div class="welcome-cta">
                <span class="cta-pill">Start now</span>
                <svg class="cta-arrow" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </div>

        </div>
    </a>

    <div class="welcome-bars">
        <span class="bar b1"></span>
        <span class="bar b2"></span>
        <span class="bar b3"></span>
    </div>

    <div class="page-wipe"></div>

</body>
</html>
