<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - DDRS</title>
    <link rel="shortcut icon" href="logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --forest-green: #114d24;
            --medium-green: #2e6b3e;
            --light-bg: #f4f7f4;
            --border-soft: #d9e2dc;
            --text-soft: #5f6b63;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            color: #333;
        }

        .navbar-ddrs {
            background-color: var(--forest-green);
            padding: 0.7rem 1.4rem;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header-logo-circle {
            width: 44px;
            height: 44px;
            background-color: #b8d0c3;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .header-logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            margin: 0;
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .brand-subtitle {
            margin: 0;
            font-size: 0.74rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.2;
        }

        .btn-top {
            background-color: #ffffff;
            color: var(--forest-green);
            font-weight: 700;
            border-radius: 10px;
            padding: 7px 16px;
            border: none;
            font-size: 0.84rem;
            min-width: 96px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-top:hover {
            background-color: #eef3ef;
            color: var(--forest-green);
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0.9rem 0.8rem;
        }

        .scanner-card {
            border: 1px solid var(--border-soft);
            border-radius: 20px;
            padding: 1.25rem 1.1rem 1rem;
            position: relative;
            background: #ffffff;
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.05);
        }

        .icon-badge {
            width: 54px;
            height: 54px;
            background: linear-gradient(180deg, #3d8c4d 0%, #2e6b3e 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin: -2.2rem auto 0.55rem;
            border: 3px solid var(--light-bg);
            box-shadow: 0 7px 18px rgba(46, 107, 62, 0.16);
        }

        .scanner-title {
            font-size: 1.45rem;
            font-weight: 800;
            color: var(--forest-green);
            margin-bottom: 0.2rem;
            line-height: 1.2;
        }

        .scanner-subtitle {
            font-size: 0.84rem;
            color: var(--text-soft);
            margin-bottom: 0.9rem;
        }

        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #dbe4de !important;
            background: #fff;
        }

        #reader video {
            border-radius: 14px;
        }

        #reader button {
            background: linear-gradient(180deg, #3d8c4d 0%, #2e6b3e 100%) !important;
            color: white !important;
            border-radius: 10px !important;
            border: none !important;
            padding: 8px 18px !important;
            font-weight: 600 !important;
            margin: 8px !important;
            text-transform: none !important;
            font-size: 0.84rem !important;
            box-shadow: none !important;
        }

        #reader select,
        #reader input {
            border-radius: 10px !important;
            border: 1px solid #cfd8d2 !important;
            padding: 8px 10px !important;
            font-size: 0.84rem !important;
        }

        #result-display {
            background-color: #edf5ef;
            border: 1px solid #d9e7dd;
            border-radius: 12px;
            padding: 12px;
            margin-top: 0.85rem;
            display: none;
            word-wrap: break-word;
        }

        .result-title {
            font-size: 0.84rem;
            font-weight: 700;
            color: var(--forest-green);
            margin-bottom: 0.25rem;
        }

        .result-text {
            margin: 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: #b02a37;
            word-break: break-word;
        }

        .btn-reset {
            background-color: transparent;
            color: var(--forest-green);
            border: 1px solid #cfd8d2;
            border-radius: 10px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 0.84rem;
            margin-top: 0.9rem;
        }

        .btn-reset:hover {
            background-color: #eef3ef;
            color: var(--forest-green);
            border-color: #cfd8d2;
        }

        footer {
            margin-top: auto;
            padding: 0.45rem 0.8rem 0.6rem;
            text-align: center;
            font-size: 0.74rem;
            color: #7b7b7b;
            line-height: 1.2;
        }

        @media (max-width: 767px) {
            .navbar-ddrs {
                padding: 0.7rem 0.9rem;
            }

            .brand-subtitle {
                display: none;
            }

            .scanner-card {
                padding: 1rem 0.9rem 0.9rem;
                max-width: 100%;
            }

            .icon-badge {
                width: 48px;
                height: 48px;
                font-size: 1.25rem;
                margin-top: -2rem;
            }

            .scanner-title {
                font-size: 1.25rem;
            }

            .scanner-subtitle {
                font-size: 0.8rem;
            }

            .btn-top {
                min-width: unset;
                padding: 7px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar-ddrs d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <div class="header-logo-circle me-2">
                <img src="logo.png" alt="Logo">
            </div>
            <div>
                <h5 class="brand-title">Document Retrieval</h5>
                <p class="brand-subtitle">QR Code Scanner</p>
            </div>
        </div>

        <a href="retrieve.html" class="btn-top">Type Code</a>
    </nav>

    <section class="main-content">
        <div class="scanner-card">
            <div class="icon-badge">
                <i class="bi bi-qr-code-scan"></i>
            </div>

            <h1 class="scanner-title">Scan Retrieval Code</h1>
            <p class="scanner-subtitle">
                Position the QR code within the frame to automatically scan.
            </p>

            <div id="reader"></div>

            <div id="result-display">
                <div class="result-title">Scanned Code</div>
                <p id="scanned-text" class="result-text"></p>
            </div>

            <button class="btn btn-reset" onclick="location.reload()">Reset Scanner</button>
        </div>
    </section>

    <footer>
        &copy; 2026 College of Engineering, Pamantasan ng Cabuyao
    </footer>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            console.log(`Code matched = ${decodedText}`, decodedResult);

            document.getElementById('result-display').style.display = 'block';
            document.getElementById('scanned-text').innerText = decodedText;

            window.location.href = decodedText;

            html5QrcodeScanner.clear();
        }

        function onScanFailure(error) {
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 10, qrbox: { width: 230, height: 230 } },
            false
        );

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
