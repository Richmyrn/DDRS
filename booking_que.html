<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Page - Booking</title>
    <link rel="shortcut icon" href="logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --pnc-green: #114d24;
            --pnc-medium-green: #2e6b3e;
            --pnc-light-bg: #f4f7f4;
            --soft-border: #d9e2dc;
            --soft-text: #5f6b63;
            --queue-red: #b02a37;
        }

        body {
            background-color: var(--pnc-light-bg);
            font-family: 'Montserrat', sans-serif;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        .navbar-custom {
            background-color: var(--pnc-green);
            padding: 0.7rem 1.4rem;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header-logo-circle {
            width: 44px;
            height: 44px;
            background-color: #b8d0c3;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .header-logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            margin: 0;
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .brand-subtitle {
            margin: 0;
            font-size: 0.74rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.2;
        }

        .btn-back {
            background-color: #ffffff;
            color: var(--pnc-green);
            font-weight: 700;
            border-radius: 10px;
            padding: 7px 16px;
            border: none;
            font-size: 0.84rem;
            text-decoration: none;
            min-width: 90px;
        }

        .btn-back:hover {
            background-color: #eef3ef;
            color: var(--pnc-green);
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0.9rem 0.8rem;
        }

        .content-wrapper {
            width: 100%;
            max-width: 980px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 0.55rem;
        }

        .page-title {
            font-weight: 800;
            font-size: 1.55rem;
            color: var(--pnc-green);
            margin-bottom: 0.1rem;
            line-height: 1.15;
        }

        .page-subtitle {
            font-size: 0.84rem;
            color: var(--soft-text);
            margin: 0;
            font-weight: 500;
            line-height: 1.3;
        }

        .queue-container {
            max-width: 460px;
            margin: 0 auto;
        }

        .queue-card {
            border-radius: 18px;
            border: 1px solid var(--soft-border);
            padding: 1.2rem 1rem 1rem;
            position: relative;
            background: white;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .icon-overlay {
            width: 52px;
            height: 52px;
            background: linear-gradient(180deg, #3d8c4d 0%, #2e6b3e 100%);
            border-radius: 50%;
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.35rem;
            border: 3px solid var(--pnc-light-bg);
            box-shadow: 0 7px 18px rgba(46, 107, 62, 0.16);
        }

        .card-title {
            font-weight: 700;
            margin-top: 0.45rem;
            margin-bottom: 0.8rem;
            color: var(--pnc-green);
            font-size: 1rem;
        }

        .queue-note {
            font-size: 0.9rem;
            color: #4f5a53;
            margin-bottom: 0.2rem;
        }

        .queue-position {
            color: var(--queue-red);
            font-weight: 800;
            font-size: 1.45rem;
            line-height: 1.1;
        }

        .queue-text {
            font-size: 0.88rem;
            color: var(--soft-text);
            margin-top: 0.2rem;
            margin-bottom: 0;
        }

        .btn-book-now {
            background: linear-gradient(180deg, #3d8c4d 0%, #2e6b3e 100%);
            color: white;
            border-radius: 10px;
            padding: 10px;
            font-weight: 700;
            width: 100%;
            border: none;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .btn-book-now:hover {
            background: linear-gradient(180deg, #357944 0%, #255733 100%);
            color: white;
        }

        .modal-content {
            border-radius: 18px;
            border: none;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
        }

        .modal-header {
            border-bottom: 1px solid #edf1ee;
        }

        .modal-title {
            font-weight: 700;
            color: var(--pnc-green);
        }

        .modal-body {
            color: #47524a;
            font-size: 0.9rem;
        }

        .btn-cancel {
            background-color: #e9ecef;
            color: #333;
            border-radius: 10px;
            padding: 8px 16px;
            font-weight: 600;
            border: none;
        }

        .btn-confirm {
            background: linear-gradient(180deg, #3d8c4d 0%, #2e6b3e 100%);
            color: white;
            border-radius: 10px;
            padding: 8px 16px;
            font-weight: 700;
            border: none;
            text-decoration: none;
        }

        .btn-confirm:hover {
            background: linear-gradient(180deg, #357944 0%, #255733 100%);
            color: white;
        }

        footer {
            color: #7b7b7b;
            font-size: 0.74rem;
            padding: 0.45rem 0.8rem 0.6rem;
            text-align: center;
            line-height: 1.2;
        }

        @media (max-width: 767px) {
            .navbar-custom {
                padding: 0.7rem 0.9rem;
            }

            .brand-subtitle {
                display: none;
            }

            .page-title {
                font-size: 1.3rem;
            }

            .page-subtitle {
                font-size: 0.78rem;
            }

            .main-content {
                padding: 0.9rem 0.7rem;
                align-items: flex-start;
            }

            .queue-card {
                padding: 1rem 0.9rem 0.9rem;
            }

            .icon-overlay {
                width: 48px;
                height: 48px;
                font-size: 1.2rem;
                top: -24px;
            }

            .btn-back {
                min-width: unset;
                padding: 7px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar-custom d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-2">
            <div class="header-logo-circle">
                <img src="logo.png" alt="Logo">
            </div>
            <div>
                <h5 class="brand-title">Queue Page</h5>
                <p class="brand-subtitle">Book Appointment</p>
            </div>
        </div>

        <a href="booking.html" class="btn btn-back">Back</a>
    </nav>

    <section class="main-content">
        <div class="content-wrapper">
            <div class="page-header">
                <h1 class="page-title">Schedule an Appointment</h1>
                <p class="page-subtitle" id="departmentSubtitle">Booking for CPE Department Chair</p>
            </div>

            <div class="queue-container">
                <div class="queue-card">
                    <div class="icon-overlay">
                        <i class="bi bi-calendar-check"></i>
                    </div>

                    <h3 class="card-title">Join Queue</h3>

                    <p class="queue-note">You are currently</p>
                    <div class="queue-position">[<span id="queueNumber">2</span>]</div>
                    <p class="queue-text">in the queue...</p>

                    <button class="btn btn-book-now" data-bs-toggle="modal" data-bs-target="#confirmModal">
                        Book Now
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 College of Engineering, Pamantasan ng Cabuyao
    </footer>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmModalLabel">Confirmation</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Do you want to proceed with this appointment booking?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancel</button>
                    <a href="#" id="confirmBookingLink" class="btn btn-confirm">Yes</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const department = (params.get('department') || 'cpe').toLowerCase();
        const queue = params.get('que') || '2';

        const departmentMap = {
            cpe: {
                label: 'CPE Department Chair',
                qrDepartment: 'CPE'
            },
            ece: {
                label: 'ECE Department Chair',
                qrDepartment: 'ECE'
            },
            ie: {
                label: 'IE Department Chair',
                qrDepartment: 'IE'
            },
            dean: {
                label: 'Dean',
                qrDepartment: 'DEAN'
            }
        };

        const selectedDepartment = departmentMap[department] || departmentMap.cpe;

        document.getElementById('departmentSubtitle').textContent =
            'Booking for ' + selectedDepartment.label;

        document.getElementById('queueNumber').textContent = queue;

        document.getElementById('confirmBookingLink').href =
            'booking_qr.html?department=' + encodeURIComponent(selectedDepartment.qrDepartment) +
            '&que=' + encodeURIComponent(queue);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
